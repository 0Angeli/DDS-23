<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aula 2</title>
    <link 
    rel="icon"
    href="https://cdn-icons-png.flaticon.com/512/763/763965.png">
  </head>
  <body>
    <h1>TABELA INCRÍVEL</h1>

    <table border="2">
        <!-- Cabeçalho da tabela -->
         <thead>
            <tr>
                <th>NOME</th>
                <th>ITEM</th>
                <th>QTD</th>
                <th>PREÇO</th>
            </tr>
         </thead>
        
        <!-- Corpo da tabela -->
         <tbody>
            <!-- Crio uma linha -->
            <tr>
                <!-- Crio uma coluna -->
                 <td>Cristiano</td>
                 <td>Perfume</td>
                 <td>7</td>
                 <td>R$777.77</td>
                 
            </tr>

            <tr>
                <td>Ronaldo</td>
                <td>Shampoo</td>
                <td>5</td>
                <td>R$123.45</td>
            </tr>
            
            <tr>
                <td>SixSeven</td>
                <td>Six</td>
                <td>Seven</td>
                <td>R$67.67</td>
            </tr>

            <tr>
                <td>Neymar</td>
                <td>Navio do Neymar</td>
                <td>3</td>
                <td>R$ 1 BILHAO</td>
            </tr>
            <tr>
                <td rowspan="2">Messi</td>
                <td>Camisa do Vasco</td>
                <td>3</td>
                <td>R$ 900</td>
            </tr>

            <tr>
                <td>Fone duvidoso</td>
                <td>67</td>
                <td>R$ 500</td>
            </tr>
            

         </tbody>

        <!-- Rodape da tabela -->
         <tfoot>
            <tr>
                <!-- Colspan = diz quantas colunas ele deve ocupar -->
                <td colspan="4">Todos os direitos reservados &nbsp;&copy;</td>
            </tr>
         </tfoot>
    </table>

    
  </body>
</html>
